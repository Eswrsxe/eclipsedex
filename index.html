<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseDex - Poke Eclipse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #9D4EDD;       
            --primary-dark: #5A189A;  
            --primary-light: #E0AAFF; 
            --accent: #C77DFF;        
            --black: #0a0a0a; 
            --black-light: #1a1a1a; 
            --white: #ffffff;
            --normal: #A8A878; --fire: #F08030; --water: #6890F0; --electric: #F8D030; --grass: #78C850;
            --ice: #98D8D8; --fighting: #C03028; --poison: #A040A0; --ground: #E0C068; --flying: #A890F0;
            --psychic: #F85888; --bug: #A8B820; --rock: #B8A038; --ghost: #705898; --dragon: #7038F8;
            --dark: #705848; --steel: #B8B8D0; --fairy: #EE99AC;
        }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #050505 0%, #10002b 50%, #240046 100%); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        
        .header { background: rgba(10, 10, 10, 0.95); border-bottom: 3px solid var(--primary); padding: 2rem; text-align: center; position: relative; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(157, 78, 221, 0.2); }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary-light), transparent); }
        
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 0.5rem; }
        .eclipse-icon { width: 70px; height: 70px; filter: drop-shadow(0 0 15px rgba(157, 78, 221, 0.8)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
        
        .title { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, #E0AAFF 0%, #9D4EDD 50%, #7B2CBF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 30px rgba(157, 78, 221, 0.3); }
        .subtitle { font-size: 0.95rem; color: #bcaaa4; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem; font-weight: 300; }
        
        /* BUSCA E FILTROS ANIMADOS */
        .search-section { background: rgba(15, 0, 30, 0.85); padding: 1.5rem 2rem; border-bottom: 1px solid rgba(157, 78, 221, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
        .search-container { display: flex; justify-content: center; width: 100%; margin: 0 auto; }
        .search-wrapper { position: relative; width: 55px; height: 55px; border-radius: 50px; background: rgba(10, 10, 10, 0.8); border: 2px solid rgba(157, 78, 221, 0.5); transition: width 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), border-color 0.3s ease; overflow: hidden; display: flex; align-items: center; }
        .search-wrapper.expanded { width: 100%; max-width: 700px; border-color: var(--primary-light); box-shadow: 0 0 25px rgba(157, 78, 221, 0.3); }
        .search-icon-btn { position: absolute; right: 12px; width: 26px; height: 26px; cursor: pointer; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .search-wrapper.expanded .search-icon-btn { right: calc(100% - 40px); }
        .search-input { width: 100%; height: 100%; padding: 0 45px 0 50px; background: transparent; border: none; color: var(--white); font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; opacity: 0; pointer-events: none; transition: opacity 0.3s ease 0.3s; }
        .search-wrapper.expanded .search-input { opacity: 1; pointer-events: auto; }
        .clear-btn { position: absolute; right: 15px; color: #aaa; background: none; border: none; font-size: 1.2rem; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, color 0.2s; }
        .clear-btn:hover { color: var(--primary-light); }
        .clear-btn.visible { opacity: 1; pointer-events: auto; }

        .filter-section-title { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin: 1.5rem 0 0.5rem 0; text-align: center; font-weight: 700; }
        .filter-buttons { display: flex; gap: 0.6rem; justify-content: center; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 0.5rem; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .filter-buttons::-webkit-scrollbar { height: 4px; }
        .filter-buttons::-webkit-scrollbar-track { background: transparent; }
        .filter-buttons::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        .gen-btn { padding: 0.6rem 1.3rem; border: 2px solid rgba(157, 78, 221, 0.3); background: rgba(10, 10, 10, 0.6); color: #aaa; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-family: 'Inter', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
        .gen-btn:hover, .gen-btn.active { border-color: var(--primary); color: var(--white); background: rgba(157, 78, 221, 0.2); box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); }
        
        .type-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.3rem 1.2rem 0.3rem 0.4rem; border: 2px solid rgba(157, 78, 221, 0.3); background: rgba(10, 10, 10, 0.6); color: #aaa; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.85rem; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .type-btn:hover, .type-btn.active { border-color: var(--primary); color: var(--white); background: rgba(157, 78, 221, 0.2); box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); }
        .type-btn-icon { height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .type-btn-rep { height: 35px; margin-left: 2px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .stats-bar { background: rgba(10, 10, 10, 0.8); padding: 1rem; text-align: center; border-bottom: 1px solid rgba(157, 78, 221, 0.1); font-size: 0.9rem; color: #888; }
        .stats-bar span { color: var(--primary-light); font-weight: 700; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .loading-state { text-align: center; padding: 4rem 2rem; color: var(--primary); font-family: 'Orbitron', sans-serif; }
        .loading-track { position: relative; width: 100%; max-width: 400px; height: 6px; margin: 3rem auto 2rem auto; background: linear-gradient(to right, #FF8C00, #9D4EDD); border-radius: 10px; box-shadow: 0 0 15px rgba(157, 78, 221, 0.4); }
        .legendary-container { position: absolute; top: -45px; left: 0%; transform: translateX(-50%); transition: left 0.4s ease-out; will-change: left; }
        #legendaryIcon { height: 55px; object-fit: contain; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }
        
        .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .pokemon-card { background: linear-gradient(135deg, rgba(30,30,30,0.9) 0%, rgba(20,20,20,0.95) 100%); border-radius: 20px; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 1px solid rgba(157, 78, 221, 0.1); }
        .pokemon-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 15px rgba(157, 78, 221, 0.2); border-color: rgba(157, 78, 221, 0.4); }
        .pokemon-image-container { height: 200px; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .pokemon-sprite { width: 160px; height: 160px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); transition: transform 0.3s ease; z-index: 1; }
        .pokemon-card:hover .pokemon-sprite { transform: scale(1.1); }
        
        .pokemon-info { padding: 1.5rem; }
        .pokemon-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pokemon-id { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--primary-light); font-weight: 700; opacity: 0.8; }
        .pokemon-name { font-family: 'Pokemon Solid', 'Inter', sans-serif; font-size: 1.8rem; color: var(--white); text-transform: capitalize; letter-spacing: 2px; -webkit-text-stroke: 0.4px #000000; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7); }
        
        .type-badge { display: inline-block; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .info-grid { display: grid; gap: 0.8rem; }
        .info-item { display: flex; align-items: flex-start; gap: 0.8rem; padding: 0.6rem; background: rgba(255,255,255,0.03); border-radius: 10px; transition: background 0.2s; }
        .info-item:hover { background: rgba(157, 78, 221, 0.1); }
        .info-icon { font-size: 1.2rem; flex-shrink: 0; }
        .info-content { flex: 1; }
        .info-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.2rem; font-weight: 600; }
        .info-value { font-size: 0.95rem; color: var(--white); font-weight: 500; line-height: 1.4; }
        .rarity-badge { display: inline-block; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .footer { background: rgba(10, 10, 10, 0.95); border-top: 3px solid var(--primary); padding: 3rem 2rem; text-align: center; margin-top: 4rem; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .footer-brand { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary-light); margin-bottom: 1rem; font-weight: 700; }
        .server-box { display: inline-flex; flex-direction: column; gap: 0.5rem; background: rgba(157, 78, 221, 0.05); padding: 1.5rem 2.5rem; border-radius: 15px; border: 1px solid rgba(157, 78, 221, 0.3); margin: 1rem 0; }
        .server-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .server-value { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--white); font-weight: 700; text-shadow: 0 0 10px rgba(157, 78, 221, 0.5); word-break: break-word; max-width: 100%; }
        
        .social-buttons { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1.5rem; }
        .circle-btn { display: flex; align-items: center; justify-content: center; width: 65px; height: 65px; border-radius: 50%; text-decoration: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .circle-btn img { width: 36px; height: 36px; object-fit: contain; }
        .discord-circle { background: #5865F2; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); }
        .discord-circle:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 8px 25px rgba(88, 101, 242, 0.6); }
        .minecraft-circle { background: #535C39; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4); }
        .minecraft-circle:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 8px 25px rgba(76, 175, 80, 0.6); background: #333; }
        
        @media (max-width: 768px) { .title { font-size: 2rem; } .pokemon-grid { grid-template-columns: 1fr; } .header { padding: 1.5rem 1rem; } .filter-buttons { justify-content: flex-start; } .filter-buttons::after { content: ''; padding-right: 1rem; } }
        ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-track { background: var(--black); } ::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 5px; } ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        
        .rarity-comum { background: #4CAF50; color: white; } .rarity-incomum { background: #8BC34A; color: white; } .rarity-raro { background: #FFC107; color: black; } .rarity-muito-raro { background: #FF9800; color: white; } .rarity-extremo { background: #F44336; color: white; } .rarity-lendario { background: linear-gradient(135deg, #9D4EDD, #C77DFF); color: white; animation: shine 3s infinite; } .rarity-mitico { background: linear-gradient(135deg, #00BCD4, #9D4EDD); color: white; animation: shine 3s infinite; }
        @keyframes shine { 0%, 100% { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.2); } 50% { opacity: 0.85; box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); } }
        .type-emoji-badge { height: 26px; margin-bottom: 1rem; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
        
        @font-face { font-family: 'Pokemon Solid'; src: url('Pokemon Solid.ttf') format('truetype'); font-weight: normal; font-style: normal; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <svg class="eclipse-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#9D4EDD" stroke-width="3" fill="none"/>
                <path d="M50 5 L50 25 M50 75 L50 95 M5 50 L25 50 M75 50 L95 50" stroke="#C77DFF" stroke-width="3"/>
                <circle cx="50" cy="50" r="15" fill="#9D4EDD"/>
                <path d="M30 30 Q50 10 70 30 Q90 50 70 70 Q50 90 30 70 Q10 50 30 30" stroke="#E0AAFF" stroke-width="2" fill="none" opacity="0.5"/>
            </svg>
            <h1 class="title">EclipseDex</h1>
        </div>
        <p class="subtitle">Spawn de todos os pokemons do servidor</p>
    </header>

    <section class="search-section">
        <div class="search-container">
            <div class="search-wrapper" id="searchWrapper">
                <svg class="search-icon-btn" id="searchIconBtn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Digite o nome ou ID do Pokémon...">
                <button class="clear-btn" id="clearBtn">✖</button>
            </div>
        </div>

        <div class="filter-section-title">Filtrar por Geração</div>
        <div class="filter-buttons" id="genFilters">
            <button class="gen-btn active" data-gen="all">Todas</button>
            <button class="gen-btn" data-gen="1">Gen 1</button>
            <button class="gen-btn" data-gen="2">Gen 2</button>
            <button class="gen-btn" data-gen="3">Gen 3</button>
            <button class="gen-btn" data-gen="4">Gen 4</button>
            <button class="gen-btn" data-gen="5">Gen 5</button>
            <button class="gen-btn" data-gen="6">Gen 6</button>
            <button class="gen-btn" data-gen="7">Gen 7</button>
            <button class="gen-btn" data-gen="8">Gen 8</button>
            <button class="gen-btn" data-gen="9">Gen 9</button>
        </div>

        <div class="filter-section-title">Filtrar por Tipo</div>
        <div class="filter-buttons" id="typeFilters">
            <button class="type-btn active" data-type="all">Todos os Tipos</button>
        </div>
    </section>

    <div class="stats-bar">
        Total: <span id="totalCount">0</span> Pokémon • Mostrando: <span id="showingCount">0</span>
    </div>

    <div class="loading-state" id="loadingState">
        <div class="loading-track">
            <div class="legendary-container" id="legendaryMover">
                <img src="https://play.pokemonshowdown.com/sprites/ani/solgaleo.gif" id="legendaryIcon" alt="Loading...">
            </div>
        </div>
        <div id="loadingText" style="font-family: 'Orbitron', sans-serif; color: var(--primary-light); font-size: 1.1rem; letter-spacing: 2px;">
            Carregando Animações... 0%
        </div>
    </div>

    <div class="container">
        <div id="pokemonGrid" class="pokemon-grid" style="display:none;"></div>
    </div>

    <footer class="footer">
        <div class="footer-brand">🌘 | 𝙀𝙘𝙡𝙞𝙥𝙨𝙚𝙋𝙤𝙠𝙚</div>
        <div class="server-box">
            <div class="server-label">Endereço do Servidor</div>
            <div class="server-value">EclipseSun.magnohost.com.br:25509</div>
        </div>
        <br>
        <div class="social-buttons">
            <a href="https://discord.gg/eclipsepoke" class="circle-btn discord-circle" target="_blank" title="Entrar no Discord">
                <img src="logo.png" alt="Discord" />
            </a>
            <a href="minecraft://?addExternalServer=EclipseSun|EclipseSun.magnohost.com.br:25509" class="circle-btn minecraft-circle" title="Adicionar Servidor no Minecraft">
                <img src="Grass_Block_JE7_BE6.png" alt="Minecraft" />
            </a>
        </div>
    </footer>

    <script src="database.js"></script>

    <script>
        const typeColors = { normal:'#A8A878', fire:'#F08030', water:'#6890F0', electric:'#F8D030', grass:'#78C850', ice:'#98D8D8', fighting:'#C03028', poison:'#A040A0', ground:'#E0C068', flying:'#A890F0', psychic:'#F85888', bug:'#A8B820', rock:'#B8A038', ghost:'#705898', dragon:'#7038F8', dark:'#705848', steel:'#B8B8D0', fairy:'#EE99AC' };
        
        const typeEmojisWeb = {
            normal: 'https://cdn.discordapp.com/emojis/1518017238857158696.png', fighting: 'https://cdn.discordapp.com/emojis/1518018527389552680.png',
            flying: 'https://cdn.discordapp.com/emojis/1518018528530137268.png', poison: 'https://cdn.discordapp.com/emojis/1518018530019119164.png',
            ground: 'https://cdn.discordapp.com/emojis/1518018531604828291.png', rock: 'https://cdn.discordapp.com/emojis/1518018535715115192.png',
            bug: 'https://cdn.discordapp.com/emojis/1518018537040384071.png', ghost: 'https://cdn.discordapp.com/emojis/1518018538298802318.png',
            steel: 'https://cdn.discordapp.com/emojis/1518018539997499453.png', fire: 'https://cdn.discordapp.com/emojis/1518018541415305307.png',
            water: 'https://cdn.discordapp.com/emojis/1518018543453605918.png', grass: 'https://cdn.discordapp.com/emojis/1518018544732864582.png',
            electric: 'https://cdn.discordapp.com/emojis/1518018545944887326.png', psychic: 'https://cdn.discordapp.com/emojis/1518018547526144162.png',
            ice: 'https://cdn.discordapp.com/emojis/1518018549396934807.png', dragon: 'https://cdn.discordapp.com/emojis/1518018550818799646.png',
            dark: 'https://cdn.discordapp.com/emojis/1518018552165306368.png', fairy: 'https://cdn.discordapp.com/emojis/1518018554257997845.png'
        };

        const icones = {
            bioma: '<img src="https://cdn.discordapp.com/emojis/1518021808983642232.png" style="width: 20px; vertical-align: middle;">',
            bloco: '<img src="https://cdn.discordapp.com/emojis/1518021807406321756.png" style="width: 20px; vertical-align: middle;">',
            condicao: '<img src="https://cdn.discordapp.com/emojis/1518021805854691428.gif" style="width: 20px; vertical-align: middle;">',
            raridade: '<img src="https://cdn.discordapp.com/emojis/1518021814322725117.png" style="width: 20px; vertical-align: middle;">'
        };

        let currentGenFilter = 'all';
        let currentTypeFilter = 'all';
        let searchTerm = '', pokemonCache = {};

        const typeReps = {
            fire: { name: 'Fogo', rep: 'charizard' }, water: { name: 'Água', rep: 'blastoise' },
            grass: { name: 'Planta', rep: 'venusaur' }, electric: { name: 'Elétrico', rep: 'pikachu' },
            ice: { name: 'Gelo', rep: 'lapras' }, fighting: { name: 'Lutador', rep: 'machamp' },
            poison: { name: 'Venenoso', rep: 'gengar' }, ground: { name: 'Terra', rep: 'groudon' },
            flying: { name: 'Voador', rep: 'pidgeot' }, psychic: { name: 'Psíquico', rep: 'mewtwo' },
            bug: { name: 'Inseto', rep: 'scyther' }, rock: { name: 'Pedra', rep: 'onix' },
            ghost: { name: 'Fantasma', rep: 'gengar' }, dragon: { name: 'Dragão', rep: 'dragonite' },
            dark: { name: 'Sombrio', rep: 'umbreon' }, steel: { name: 'Aço', rep: 'lucario' },
            fairy: { name: 'Fada', rep: 'sylveon' }, normal: { name: 'Normal', rep: 'snorlax' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            applyInitialSearchFromUrl();
            generateTypeButtons();
            setupEventListeners();
            loadPokemonData();
        });

        function applyInitialSearchFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const initialSearch = (params.get('search') || params.get('q') || '').trim();
            if (initialSearch) {
                const input = document.getElementById('searchInput');
                if (input) input.value = initialSearch;
                searchTerm = initialSearch.toLowerCase();
            }
        }

        function generateTypeButtons() {
            const container = document.getElementById('typeFilters');
            Object.keys(typeEmojisWeb).forEach(type => {
                if (typeReps[type]) {
                    const btn = document.createElement('button');
                    btn.className = 'type-btn';
                    btn.dataset.type = type;
                    btn.innerHTML = `<img src="${typeEmojisWeb[type]}" class="type-btn-icon" alt="${type}"> ${typeReps[type].name} <img src="https://play.pokemonshowdown.com/sprites/ani/${typeReps[type].rep}.gif" class="type-btn-rep">`;
                    container.appendChild(btn);
                }
            });
        }

        function setupEventListeners() {
            const wrapper = document.getElementById('searchWrapper');
            const iconBtn = document.getElementById('searchIconBtn');
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');

            iconBtn.addEventListener('click', () => { wrapper.classList.add('expanded'); input.focus(); });

            input.addEventListener('input', (e) => { 
                searchTerm = e.target.value.toLowerCase(); 
                clearBtn.classList.toggle('visible', searchTerm.length > 0);
                renderPokemon(); 
            });

            clearBtn.addEventListener('click', () => {
                input.value = ''; searchTerm = '';
                clearBtn.classList.remove('visible');
                renderPokemon(); input.focus();
            });

            document.querySelectorAll('.gen-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.gen-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentGenFilter = e.target.dataset.gen;
                    renderPokemon();
                });
            });

            document.getElementById('typeFilters').addEventListener('click', (e) => {
                const btn = e.target.closest('.type-btn');
                if (!btn) return;
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTypeFilter = btn.dataset.type;
                renderPokemon();
            });
        }

        async function loadPokemonData() {
            const loadingState = document.getElementById('loadingState');
            const grid = document.getElementById('pokemonGrid');

            try {
                const batchSize = 50;
                const total = pokemonDatabase.length;

                for (let i = 0; i < total; i += batchSize) {
                    const batch = pokemonDatabase.slice(i, i + batchSize);

                    await Promise.all(batch.map(async (pokemon) => {
                        if (pokemonCache[pokemon.id]) return;
                        
                        const nomeGif = pokemon.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                        const spriteAnimado = `https://play.pokemonshowdown.com/sprites/ani/${nomeGif}.gif`;

                        try {
                            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemon.id}`);
                            if (!res.ok) throw new Error('API error');
                            const data = await res.json();
                            
                            pokemonCache[pokemon.id] = {
                                ...pokemon,
                                sprite: spriteAnimado,
                                type: data.types[0].type.name,
                                typeName: data.types[0].type.name.charAt(0).toUpperCase() + data.types[0].type.name.slice(1)
                            };
                        } catch (err) {
                            pokemonCache[pokemon.id] = { ...pokemon, sprite: spriteAnimado, type: 'normal', typeName: 'Desconhecido' };
                        }
                    }));
                    
                    const progress = Math.min(((i + batchSize) / total) * 100, 100);
                    const progressMath = Math.round(progress);

                    const textoLoading = document.getElementById('loadingText');
                    if (textoLoading) textoLoading.textContent = `Carregando Animações... ${progressMath}%`;

                    const mover = document.getElementById('legendaryMover');
                    if (mover) mover.style.left = `${progress}%`;

                    const icon = document.getElementById('legendaryIcon');
                    if (progressMath >= 50 && icon && !icon.src.includes('lunala')) {
                        icon.src = 'https://play.pokemonshowdown.com/sprites/ani/lunala.gif';
                    }
                }
                
                loadingState.style.display = 'none';
                grid.style.display = 'grid';
                document.getElementById('totalCount').textContent = pokemonDatabase.length;
                
                if (searchTerm) {
                    document.getElementById('searchWrapper').classList.add('expanded');
                    document.getElementById('clearBtn').classList.add('visible');
                }
                renderPokemon();
                
            } catch (error) {
                loadingState.innerHTML = '<div style="color: #f44336; font-family: Orbitron; font-size: 1.2rem;">Erro ao carregar os dados. Recarregue a página!</div>';
            }
        }

        function renderPokemon() {
            const grid = document.getElementById('pokemonGrid');
            grid.innerHTML = '';
            
            const filtered = Object.values(pokemonCache).filter(p => {
                const matchesGen = currentGenFilter === 'all' || p.gen == currentGenFilter;
                const matchesType = currentTypeFilter === 'all' || p.type === currentTypeFilter;
                const matchesSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm) || p.num.toLowerCase().includes(searchTerm);
                return matchesGen && matchesType && matchesSearch;
            });
            
            if (!filtered.length) {
                grid.innerHTML = `
                    <div class="no-results" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; grid-column: 1 / -1;">
                        <img src="54.gif" alt="Psyduck" style="width: 120px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); margin-bottom: 1.5rem;">
                        <h2 style="font-family: 'Pokemon Solid', sans-serif; -webkit-text-stroke: 0.6px #000; color: #F8D030; letter-spacing: 2px; font-size: 1.8rem;">Psyduck está confuso...</h2>
                        <p style="color: #aaa; margin-top: 0.5rem; font-size: 1.1rem;">Nenhum Pokémon encontrado com esse nome!</p>
                    </div>`;
                document.getElementById('showingCount').textContent = '0';
                return;
            }

            filtered.forEach((pokemon) => {
                const card = document.createElement('div');
                card.className = 'pokemon-card';
                const typeColor = typeColors[pokemon.type] || typeColors.normal;
                
                const imgTipo = typeEmojisWeb[pokemon.type];
                const badgeHtml = imgTipo 
                    ? `<img src="${imgTipo}" alt="${pokemon.typeName}" class="type-emoji-badge">`
                    : `<span class="type-badge" style="background: ${typeColor}">${pokemon.typeName}</span>`;
                
                card.innerHTML = `
                    <div class="pokemon-image-container" style="background: linear-gradient(135deg, ${typeColor}22 0%, ${typeColor}05 100%);">
                        ${pokemon.sprite ? `<img src="${pokemon.sprite}" alt="${pokemon.name}" class="pokemon-sprite" loading="lazy">` : '<div class="pokemon-sprite" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:2rem">?</div>'}
                    </div>
                    <div class="pokemon-info">
                        <div class="pokemon-header">
                            <span class="pokemon-id">${pokemon.num}</span>
                            <h3 class="pokemon-name">${pokemon.name}</h3>
                        </div>
                        ${badgeHtml}
                        <div class="info-grid">
                            <div class="info-item"><span class="info-icon">${icones.bioma}</span><div class="info-content"><div class="info-label">Bioma</div><div class="info-value">${pokemon.biome}</div></div></div>
                            <div class="info-item"><span class="info-icon">${icones.bloco}</span><div class="info-content"><div class="info-label">Bloco</div><div class="info-value">${pokemon.block || 'N/A'}</div></div></div>
                            <div class="info-item"><span class="info-icon">${icones.condicao}</span><div class="info-content"><div class="info-label">Condição</div><div class="info-value">${pokemon.condition || 'Nenhuma'}</div></div></div>
                            <div class="info-item"><span class="info-icon">${icones.raridade}</span><div class="info-content"><div class="info-label">Raridade</div><span class="rarity-badge ${getRarityClass(pokemon.rarity)}">${pokemon.rarity}</span></div></div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
            document.getElementById('showingCount').textContent = filtered.length;
        }

        function getRarityClass(r) {
            r = r.toLowerCase();
            if (r.includes('comum') && !r.includes('incomum')) return 'rarity-comum';
            if (r.includes('incomum')) return 'rarity-incomum';
            if (r.includes('raro') && !r.includes('muito')) return 'rarity-raro';
            if (r.includes('muito raro')) return 'rarity-muito-raro';
            if (r.includes('ext')) return 'rarity-extremo';
            if (r.includes('lendário')) return 'rarity-lendario';
            if (r.includes('mítico')) return 'rarity-mitico';
            return 'rarity-comum';
        }
    </script>
</body>
</html>
