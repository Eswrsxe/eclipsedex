<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseDex - Poke Eclipse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <svg class="eclipse-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#9D4EDD" stroke-width="3" fill="none"/>
                <path d="M50 5 L50 25 M50 75 L50 95 M5 50 L25 50 M75 50 L95 50" stroke="#C77DFF" stroke-width="3"/>
                <circle cx="50" cy="50" r="15" fill="#9D4EDD"/>
                <path d="M30 30 Q50 10 70 30 Q90 50 70 70 Q50 90 30 70 Q10 50 30 30" stroke="#E0AAFF" stroke-width="2" fill="none" opacity="0.5"/>
            </svg>
            <h1 class="title">EclipseDex</h1>
        </div>
        <p class="subtitle">Spawn de todos os pokemons do servidor</p>
    </header>

    <section class="search-section">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar Pokémon por nome ou ID...">
        </div>
        <div class="filter-buttons" id="filterButtons">
            <button class="gen-btn active" data-gen="all">Todos</button>
            <button class="gen-btn" data-gen="1">Gen 1</button>
            <button class="gen-btn" data-gen="2">Gen 2</button>
            <button class="gen-btn" data-gen="3">Gen 3</button>
            <button class="gen-btn" data-gen="4">Gen 4</button>
            <button class="gen-btn" data-gen="5">Gen 5</button>
            <button class="gen-btn" data-gen="6">Gen 6</button>
            <button class="gen-btn" data-gen="7">Gen 7</button>
            <button class="gen-btn" data-gen="8">Gen 8</button>
            <button class="gen-btn" data-gen="9">Gen 9</button>
        </div>
    </section>

    <div class="stats-bar">
        Total: <span id="totalCount">0</span> Pokémon • Mostrando: <span id="showingCount">0</span>
    </div>

    <div class="container">
        <div class="pokemon-grid" id="pokemonGrid"></div>
        <div class="loading-more" id="loadingMore">
            <div class="loading-spinner"></div> Carregando dados...
        </div>
    </div>

    <footer class="footer">
        <div class="footer-brand">🌑 POKE ECLIPSE 🌑</div>
        <div class="server-box">
            <div class="server-label">Endereço do Servidor</div>
            <div class="server-value">eclipseSeason3.bed.net.br:25180</div>
        </div>
        <br>
        <a href="#" class="discord-btn" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            Join Discord
        </a>
    </footer>
</body>
</html>
