<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devicke-width, initial-scale=1.0">
    <title>EclipseDex - Poke Eclipse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            /* Paleta Roxa Eclipse */
            --primary: #9D4EDD;       
            --primary-dark: #5A189A;  
            --primary-light: #E0AAFF; 
            --accent: #C77DFF;        
            
            --black: #0a0a0a; 
            --black-light: #1a1a1a; 
            --white: #ffffff;
            
            /* Tipos Pokémon */
            --normal: #A8A878; --fire: #F08030; --water: #6890F0; --electric: #F8D030; --grass: #78C850;
            --ice: #98D8D8; --fighting: #C03028; --poison: #A040A0; --ground: #E0C068; --flying: #A890F0;
            --psychic: #F85888; --bug: #A8B820; --rock: #B8A038; --ghost: #705898; --dragon: #7038F8;
            --dark: #705848; --steel: #B8B8D0; --fairy: #EE99AC;
        }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #050505 0%, #10002b 50%, #240046 100%); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        
        .header { background: rgba(10, 10, 10, 0.95); border-bottom: 3px solid var(--primary); padding: 2rem; text-align: center; position: relative; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(157, 78, 221, 0.2); }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary-light), transparent); }
        
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 0.5rem; }
        .eclipse-icon { width: 70px; height: 70px; filter: drop-shadow(0 0 15px rgba(157, 78, 221, 0.8)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
        
        .title { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, #E0AAFF 0%, #9D4EDD 50%, #7B2CBF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 30px rgba(157, 78, 221, 0.3); }
        .subtitle { font-size: 0.95rem; color: #bcaaa4; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem; font-weight: 300; }
        
        .search-section { background: rgba(20, 0, 40, 0.6); padding: 2rem; border-bottom: 1px solid rgba(157, 78, 221, 0.2); backdrop-filter: blur(5px); }
        .search-container { max-width: 700px; margin: 0 auto; }
        .search-input { width: 100%; padding: 1rem 1.5rem; font-size: 1rem; border: 2px solid rgba(157, 78, 221, 0.3); border-radius: 50px; background: rgba(10, 10, 10, 0.8); color: var(--white); outline: none; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 25px rgba(157, 78, 221, 0.3); transform: translateY(-2px); }
        .search-input::placeholder { color: #666; }
        
        .filter-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
        .gen-btn { padding: 0.6rem 1.3rem; border: 2px solid rgba(157, 78, 221, 0.3); background: rgba(10, 10, 10, 0.6); color: #aaa; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-family: 'Inter', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .gen-btn:hover { border-color: var(--primary); color: var(--primary-light); transform: translateY(-2px); background: rgba(157, 78, 221, 0.1); }
        .gen-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); }
        
        .stats-bar { background: rgba(10, 10, 10, 0.8); padding: 1rem; text-align: center; border-bottom: 1px solid rgba(157, 78, 221, 0.1); font-size: 0.9rem; color: #888; }
        .stats-bar span { color: var(--primary-light); font-weight: 700; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .loading-state { text-align: center; padding: 4rem 2rem; color: var(--primary); font-family: 'Orbitron', sans-serif; }
        /* Barra de Carregamento Eclipse */
        .loading-track {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 6px;
            margin: 3rem auto 2rem auto;
            background: linear-gradient(to right, #FF8C00, #9D4EDD); /* Laranja para Roxo */
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }
        
        .legendary-container {
            position: absolute;
            top: -45px; /* Posiciona o Pokémon correndo/voando exatamente EM CIMA da linha */
            left: 0%;
            transform: translateX(-50%); /* Centraliza a imagem no ponto exato da porcentagem */
            transition: left 0.4s ease-out; /* Movimento suave conforme carrega */
            will-change: left;
        }
        
        #legendaryIcon {
            height: 55px; /* Tamanho fixo para a transição não dar pulos */
            object-fit: contain;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        /* CORREÇÃO AQUI: Opacidade inicial e animação removidas para evitar bugs no WebView */
        .pokemon-card { background: linear-gradient(135deg, rgba(30,30,30,0.9) 0%, rgba(20,20,20,0.95) 100%); border-radius: 20px; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 1px solid rgba(157, 78, 221, 0.1); }
        .pokemon-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 15px rgba(157, 78, 221, 0.2); border-color: rgba(157, 78, 221, 0.4); }
        
        .pokemon-image-container { height: 200px; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .pokemon-sprite { width: 160px; height: 160px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); transition: transform 0.3s ease; z-index: 1; }
        .pokemon-card:hover .pokemon-sprite { transform: scale(1.1); }
        
        .pokemon-info { padding: 1.5rem; }
        .pokemon-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pokemon-id { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--primary-light); font-weight: 700; opacity: 0.8; }
        .pokemon-name { 
            font-family: 'Pokemon Solid', 'Inter', sans-serif; 
            font-size: 1.8rem; 
            color: var(--white); 
            text-transform: capitalize; 
            letter-spacing: 2px; 
            
            /* Borda ultra fina e discreta (0.6 pixels) */
            -webkit-text-stroke: 0.4px #000000; 
            
            /* Sombra mais leve para não borrar a leitura */
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7); 
        }
        
        .type-badge { display: inline-block; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .info-grid { display: grid; gap: 0.8rem; }
        .info-item { display: flex; align-items: flex-start; gap: 0.8rem; padding: 0.6rem; background: rgba(255,255,255,0.03); border-radius: 10px; transition: background 0.2s; }
        .info-item:hover { background: rgba(157, 78, 221, 0.1); }
        .info-icon { font-size: 1.2rem; flex-shrink: 0; }
        .info-content { flex: 1; }
        .info-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.2rem; font-weight: 600; }
        .info-value { font-size: 0.95rem; color: var(--white); font-weight: 500; line-height: 1.4; }
        
        .rarity-badge { display: inline-block; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .no-results { text-align: center; padding: 4rem 2rem; grid-column: 1 / -1; color: #666; font-size: 1.1rem; }
        
        .footer { background: rgba(10, 10, 10, 0.95); border-top: 3px solid var(--primary); padding: 3rem 2rem; text-align: center; margin-top: 4rem; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .footer-brand { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary-light); margin-bottom: 1rem; font-weight: 700; }
        .server-box { display: inline-flex; flex-direction: column; gap: 0.5rem; background: rgba(157, 78, 221, 0.05); padding: 1.5rem 2.5rem; border-radius: 15px; border: 1px solid rgba(157, 78, 221, 0.3); margin: 1rem 0; }
        .server-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        /* CORREÇÃO AQUI: Quebra de texto garantida no IP */
        .server-value { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--white); font-weight: 700; text-shadow: 0 0 10px rgba(157, 78, 221, 0.5); word-break: break-word; max-width: 100%; }
        
        .discord-btn { display: inline-flex; align-items: center; gap: 0.6rem; margin-top: 1.5rem; padding: 0.9rem 2rem; background: #5865F2; color: white; text-decoration: none; border-radius: 30px; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3); }
        .discord-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(88, 101, 242, 0.4); }
        
        @media (max-width: 768px) { .title { font-size: 2rem; } .pokemon-grid { grid-template-columns: 1fr; } .header { padding: 1.5rem 1rem; } }
        
        ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-track { background: var(--black); } ::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 5px; } ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        
        .rarity-comum { background: #4CAF50; color: white; }
        .rarity-incomum { background: #8BC34A; color: white; }
        .rarity-raro { background: #FFC107; color: black; }
        .rarity-muito-raro { background: #FF9800; color: white; }
        .rarity-extremo { background: #F44336; color: white; }
        .rarity-lendario { background: linear-gradient(135deg, #9D4EDD, #C77DFF); color: white; animation: shine 3s infinite; }
        .rarity-mitico { background: linear-gradient(135deg, #00BCD4, #9D4EDD); color: white; animation: shine 3s infinite; }
        
        @keyframes shine { 0%, 100% { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.2); } 50% { opacity: 0.85; box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); } }
        .type-emoji-badge { height: 26px; margin-bottom: 1rem; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
        @font-face {
            font-family: 'Pokemon Solid';
            src: url('Pokemon Solid.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <svg class="eclipse-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#9D4EDD" stroke-width="3" fill="none"/>
                <path d="M50 5 L50 25 M50 75 L50 95 M5 50 L25 50 M75 50 L95 50" stroke="#C77DFF" stroke-width="3"/>
                <circle cx="50" cy="50" r="15" fill="#9D4EDD"/>
                <path d="M30 30 Q50 10 70 30 Q90 50 70 70 Q50 90 30 70 Q10 50 30 30" stroke="#E0AAFF" stroke-width="2" fill="none" opacity="0.5"/>
            </svg>
            <h1 class="title">EclipseDex</h1>
        </div>
        <p class="subtitle">Spawn de todos os pokemons do servidor</p>
    </header>

    <section class="search-section">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar Pokémon por nome ou ID...">
        </div>
        <div class="filter-buttons" id="filterButtons">
            <button class="gen-btn active" data-gen="all">Todos</button>
            <button class="gen-btn" data-gen="1">Gen 1</button>
            <button class="gen-btn" data-gen="2">Gen 2</button>
            <button class="gen-btn" data-gen="3">Gen 3</button>
            <button class="gen-btn" data-gen="4">Gen 4</button>
            <button class="gen-btn" data-gen="5">Gen 5</button>
            <button class="gen-btn" data-gen="6">Gen 6</button>
            <button class="gen-btn" data-gen="7">Gen 7</button>
            <button class="gen-btn" data-gen="8">Gen 8</button>
            <button class="gen-btn" data-gen="9">Gen 9</button>
        </div>
    </section>

    <div class="stats-bar">
        Total: <span id="totalCount">0</span> Pokémon • Mostrando: <span id="showingCount">0</span>
    </div>

    <div class="container">
        <div class="loading-state" id="loadingState">
            <div class="loading-track">
                <div class="legendary-container" id="legendaryMover">
                    <img src="https://play.pokemonshowdown.com/sprites/ani/solgaleo.gif" id="legendaryIcon" alt="Loading...">
                </div>
            </div>
            <div id="loadingText" style="font-family: 'Orbitron', sans-serif; color: var(--primary-light); font-size: 1.1rem; letter-spacing: 2px;">
                Carregando Animações... 0%
            </div>
        </div>

    <footer class="footer">
        <div class="footer-brand">🌑 POKE ECLIPSE 🌑</div>
        <div class="server-box">
            <div class="server-label">Endereço do Servidor</div>
            <div class="server-value">eclipseSeason3.bed.net.br:25180</div>
        </div>
        <br>
        <a href="#" class="discord-btn" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            Join Discord
        </a>
    </footer>

    <script src="database.js"></script>

    <script>
        const typeColors = { normal:'#A8A878', fire:'#F08030', water:'#6890F0', electric:'#F8D030', grass:'#78C850', ice:'#98D8D8', fighting:'#C03028', poison:'#A040A0', ground:'#E0C068', flying:'#A890F0', psychic:'#F85888', bug:'#A8B820', rock:'#B8A038', ghost:'#705898', dragon:'#7038F8', dark:'#705848', steel:'#B8B8D0', fairy:'#EE99AC' };
        
        // 🔮 Dicionário de Emojis de Tipos (As suas pílulas!)
        const typeEmojisWeb = {
            normal: 'https://cdn.discordapp.com/emojis/1518017238857158696.png',
            fighting: 'https://cdn.discordapp.com/emojis/1518018527389552680.png',
            flying: 'https://cdn.discordapp.com/emojis/1518018528530137268.png',
            poison: 'https://cdn.discordapp.com/emojis/1518018530019119164.png',
            ground: 'https://cdn.discordapp.com/emojis/1518018531604828291.png',
            rock: 'https://cdn.discordapp.com/emojis/1518018535715115192.png',
            bug: 'https://cdn.discordapp.com/emojis/1518018537040384071.png',
            ghost: 'https://cdn.discordapp.com/emojis/1518018538298802318.png',
            steel: 'https://cdn.discordapp.com/emojis/1518018539997499453.png',
            fire: 'https://cdn.discordapp.com/emojis/1518018541415305307.png',
            water: 'https://cdn.discordapp.com/emojis/1518018543453605918.png',
            grass: 'https://cdn.discordapp.com/emojis/1518018544732864582.png',
            electric: 'https://cdn.discordapp.com/emojis/1518018545944887326.png',
            psychic: 'https://cdn.discordapp.com/emojis/1518018547526144162.png',
            ice: 'https://cdn.discordapp.com/emojis/1518018549396934807.png',
            dragon: 'https://cdn.discordapp.com/emojis/1518018550818799646.png',
            dark: 'https://cdn.discordapp.com/emojis/1518018552165306368.png',
            fairy: 'https://cdn.discordapp.com/emojis/1518018554257997845.png'
        };

        const icones = {
            bioma: '<img src="https://cdn.discordapp.com/emojis/1518021808983642232.png" style="width: 20px; vertical-align: middle;">',
            bloco: '<img src="https://cdn.discordapp.com/emojis/1518021807406321756.png" style="width: 20px; vertical-align: middle;">',
            condicao: '<img src="https://cdn.discordapp.com/emojis/1518021805854691428.gif" style="width: 20px; vertical-align: middle;">',
            raridade: '<img src="https://cdn.discordapp.com/emojis/1518021814322725117.png" style="width: 20px; vertical-align: middle;">'
        };

        let currentFilter = 'all', searchTerm = '', pokemonCache = {};

        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            loadPokemonData();
        });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); renderPokemon(); });
            document.querySelectorAll('.gen-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.gen-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.gen;
                    renderPokemon();
                });
            });
        }

loadPokemonData()

        function renderPokemon() {
            const grid = document.getElementById('pokemonGrid');
            grid.innerHTML = '';
            const filtered = Object.values(pokemonCache).filter(p => {
                const matchesGen = currentFilter === 'all' || p.gen == currentFilter;
                const matchesSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm) || p.num.toLowerCase().includes(searchTerm);
                return matchesGen && matchesSearch;
            });
            
            if (!filtered.length) {
                grid.innerHTML = '<div class="no-results">Nenhum Pokémon encontrado</div>';
                document.getElementById('showingCount').textContent = '0';
                return;
            }
            
            filtered.forEach((pokemon) => {
                const card = document.createElement('div');
                card.className = 'pokemon-card';
                const typeColor = typeColors[pokemon.type] || typeColors.normal;
                
                // Vai procurar a imagem do tipo, se não encontrar (ou falhar a API), usa a etiqueta antiga de texto
                const imgTipo = typeEmojisWeb[pokemon.type];
                const badgeHtml = imgTipo 
                    ? `<img src="${imgTipo}" alt="${pokemon.typeName}" class="type-emoji-badge">`
                    : `<span class="type-badge" style="background: ${typeColor}">${pokemon.typeName}</span>`;
                
                card.innerHTML = `
                    <div class="pokemon-image-container" style="background: linear-gradient(135deg, ${typeColor}22 0%, ${typeColor}05 100%);">
                        ${pokemon.sprite ? `<img src="${pokemon.sprite}" alt="${pokemon.name}" class="pokemon-sprite" loading="lazy">` : '<div class="pokemon-sprite" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:2rem">?</div>'}
                    </div>
                    <div class="pokemon-info">
                        <div class="pokemon-header">
                            <span class="pokemon-id">${pokemon.num}</span>
                            <h3 class="pokemon-name">${pokemon.name}</h3>
                        </div>
                        ${badgeHtml}
                        <div class="info-grid">
                            <div class="info-item"><span class="info-icon">${icones.bioma}</span><div class="info-content"><div class="info-label">Bioma</div><div class="info-value">${pokemon.biome}</div></div></div>
                            <div class="info-item"><span class="info-icon">${icones.bloco}</span><div class="info-content"><div class="info-label">Bloco</div><div class="info-value">${pokemon.block || 'N/A'}</div></div></div>
                            <div class="info-item"><span class="info-icon">${icones.condicao}</span><div class="info-content"><div class="info-label">Condição</div><div class="info-value">${pokemon.condition || 'Nenhuma'}</div></div></div>
                            <div class="info-item"><span class="info-icon">${icones.raridade}</span><div class="info-content"><div class="info-label">Raridade</div><span class="rarity-badge ${getRarityClass(pokemon.rarity)}">${pokemon.rarity}</span></div></div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
            document.getElementById('showingCount').textContent = filtered.length;
        }

        function getRarityClass(r) {
            r = r.toLowerCase();
            if (r.includes('comum') && !r.includes('incomum')) return 'rarity-comum';
            if (r.includes('incomum')) return 'rarity-incomum';
            if (r.includes('raro') && !r.includes('muito')) return 'rarity-raro';
            if (r.includes('muito raro')) return 'rarity-muito-raro';
            if (r.includes('ext')) return 'rarity-extremo';
            if (r.includes('lendário')) return 'rarity-lendario';
            if (r.includes('mítico')) return 'rarity-mitico';
            return 'rarity-comum';
        }
    </script>
